name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  format-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: vlang/setup-v@v1.4
        with:
          version: '57f11c6'
          cache: 'false'

      - name: Check formatting
        run: v run ./make.vsh verify-format

  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: vlang/setup-v@v1.4
        with:
          version: '57f11c6'
          cache: 'false'

      - name: Cache V modules
        uses: actions/cache@v4
        with:
          path: ~/.vmodules
          key: vmodules-v3-${{ hashFiles('v.mod') }}
          restore-keys: vmodules-v3-

      - name: Install dependencies
        run: v install tauraamui.bobatea

      - name: Remove V source from workspace
        run: rm -rf vlang/

      - run: v run ./make.vsh build
      - name: Run tests
        timeout-minutes: 3
        run: v run ./make.vsh verbose-test

  prod_build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: vlang/setup-v@v1.4
        with:
          version: '57f11c6'
          cache: 'false'

      - name: Cache V modules
        uses: actions/cache@v4
        with:
          path: ~/.vmodules
          key: vmodules-prod-v2-${{ hashFiles('v.mod') }}
          restore-keys: vmodules-prod-v2-

      - name: Install dependencies
        run: v install tauraamui.bobatea

      - name: Generate git hash
        run: git log -n 1 --pretty=format:"%h" | tee ./.githash

      - name: Build (prod with debug symbols)
        run: v -prod -g -cc gcc . -o lilly-prod

      - name: Upload prod binary
        uses: actions/upload-artifact@v4
        with:
          name: lilly-prod-linux-amd64
          path: lilly-prod
