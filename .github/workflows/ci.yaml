name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  format-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: vlang/setup-v@v1.4
        with:
          check-latest: true

      - name: Check formatting
        run: |
          find . -name '*.v' -not -path './.vmodules/*' | xargs v fmt -w
          git diff --exit-code

  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: vlang/setup-v@v1.4
        with:
          check-latest: true

      - name: Cache V modules
        uses: actions/cache@v4
        with:
          path: ~/.vmodules
          key: vmodules-v1-${{ hashFiles('v.mod') }}
          restore-keys: vmodules-v1-

      - name: Install dependencies
        run: v install tauraamui.bobatea

      - name: Remove V source from workspace
        run: rm -rf vlang/

      - run: v run ./make.vsh build
      - name: Run tests
        timeout-minutes: 3
        run: v run ./make.vsh verbose-test
