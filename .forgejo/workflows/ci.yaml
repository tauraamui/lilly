name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  format-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-v-latest

      - name: Check formatting
        run: v run ./make.vsh verify-format

  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-v-latest

      - name: Cache V modules
        uses: actions/cache@v4
        with:
          path: ~/.vmodules
          key: vmodules-v4-${{ hashFiles('v.mod') }}
          restore-keys: vmodules-v4-

      - name: Install dependencies
        run: v install

      - name: Remove V source from workspace
        run: rm -rf vlang/

      - run: v run ./make.vsh build
      - name: Run tests
        timeout-minutes: 3
        run: v run ./make.vsh verbose-test

  visual_regression:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-v-latest

      - name: Cache V modules
        uses: actions/cache@v4
        with:
          path: ~/.vmodules
          key: vmodules-xpty3-${{ hashFiles('v.mod') }}
          restore-keys: vmodules-xpty3-

      - name: Install dependencies
        run: v install

      - name: Check for golden frames
        id: check_golden
        run: |
          if ls testdata/xpty/*/frame_*.txt 1>/dev/null 2>&1; then
            echo "has_golden=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_golden=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No golden frames committed yet — skipping visual regression"
          fi

      - name: Run visual regression
        if: steps.check_golden.outputs.has_golden == 'true'
        timeout-minutes: 3
        run: v run ./make.vsh xpty-verify

  prod_build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-v-latest

      - name: Cache V modules
        uses: actions/cache@v4
        with:
          path: ~/.vmodules
          key: vmodules-prod3-${{ hashFiles('v.mod') }}
          restore-keys: vmodules-prod3-

      - name: Install dependencies
        run: v install

      - name: Generate git hash
        run: git log -n 1 --pretty=format:"%h" | tee ./.githash

      - name: Build (prod with debug symbols)
        run: v -prod -g -cc gcc . -o lilly-prod


